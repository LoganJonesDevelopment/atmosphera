<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atmosphera</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/overlay.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/weather-panel.css">
<link rel="stylesheet" href="css/loading.css">
<link rel="stylesheet" href="css/clock.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="loading-state" id="loading">
  <div class="loading-text">Atmosphera</div>
</div>

<canvas id="scene"></canvas>

<div class="overlay">
  <div class="top-bar">
    <div class="brand">Atmosphera</div>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" class="search-input" id="search" placeholder="Search city..." autocomplete="off">
      <button class="geolocate-btn" id="geoBtn" title="Use my location">&#9737;</button>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="weather-panel" id="weatherPanel" style="display:none;">
      <div class="weather-glass">
        <div class="weather-location" id="locationName">--</div>
        <div class="weather-temp"><span id="tempValue">--</span><span class="unit" id="unitToggle">&deg;F</span></div>
        <div class="weather-desc" id="weatherDesc">--</div>
        <div class="weather-details">
          <div class="detail-item">
            <div class="detail-label">Wind</div>
            <div class="detail-value" id="windSpeed">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Humidity</div>
            <div class="detail-value" id="humidity">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Feels Like</div>
            <div class="detail-value" id="feelsLike">--</div>
          </div>
        </div>
        <div class="hourly-row" id="hourly"></div>
        <div class="forecast-row" id="forecast"></div>
      </div>
    </div>

    <div class="time-display">
      <div class="time-clock" id="clock">--:--</div>
      <div class="time-date" id="dateDisplay">--</div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
