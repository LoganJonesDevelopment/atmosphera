<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Atmosphera — Animated Canvas Weather</title>
<meta name="description" content="Live weather rendered as a full-screen animated scene — sun and moon on real solar arcs, drifting clouds, rain, snow, fog, and lightning driven by actual conditions. Vanilla JS and HTML5 Canvas, zero dependencies.">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9B%85%3C/text%3E%3C/svg%3E">
<meta property="og:title" content="Atmosphera — Animated Canvas Weather">
<meta property="og:description" content="Live weather rendered as a full-screen animated scene. Vanilla JS and HTML5 Canvas, zero dependencies.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://atmosphera-inky.vercel.app/">
<meta property="og:image" content="https://atmosphera-inky.vercel.app/og.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/overlay.css">
<link rel="stylesheet" href="css/search.css">
<link rel="stylesheet" href="css/weather-panel.css">
<link rel="stylesheet" href="css/loading.css">
<link rel="stylesheet" href="css/clock.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="loading-state" id="loading">
  <div class="loading-text">Atmosphera</div>
</div>

<canvas id="scene"></canvas>

<div class="overlay">
  <div class="top-bar">
    <div class="brand">Atmosphera</div>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" class="search-input" id="search" placeholder="Search city..." autocomplete="off" aria-label="Search city">
      <button class="random-btn" id="randomBtn" title="Random city" aria-label="Go to a random city">
        <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="1.5" width="13" height="13" rx="3.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="5.3" cy="5.3" r="1.25" fill="currentColor"/><circle cx="8" cy="8" r="1.25" fill="currentColor"/><circle cx="10.7" cy="10.7" r="1.25" fill="currentColor"/></svg>
      </button>
      <button class="geolocate-btn" id="geoBtn" title="Use my location" aria-label="Use my location">
        <svg width="15" height="15" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="4.4" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="1.4" fill="currentColor"/><path d="M8 .9v2.3M8 12.8v2.3M.9 8h2.3M12.8 8h2.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="weather-panel" id="weatherPanel" style="display:none;">
      <div class="weather-glass">
        <div class="weather-location" id="locationName">--</div>
        <div class="weather-temp"><span id="tempValue">--</span><button class="unit" id="unitToggle" aria-label="Switch temperature units">&deg;F</button></div>
        <div class="weather-desc" id="weatherDesc">--</div>
        <div class="weather-details">
          <div class="detail-item">
            <div class="detail-label">Wind</div>
            <div class="detail-value" id="windSpeed">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Humidity</div>
            <div class="detail-value" id="humidity">--</div>
          </div>
          <div class="detail-item">
            <div class="detail-label">Feels Like</div>
            <div class="detail-value" id="feelsLike">--</div>
          </div>
        </div>
        <button class="panel-toggle" id="panelToggle" aria-expanded="true" aria-controls="panelExtra">
          <span>Hourly &amp; 5-day</span>
          <svg class="panel-toggle-chevron" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M2 4.5 6 8.5 10 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="panel-extra" id="panelExtra">
          <div class="panel-extra-inner">
            <div class="hourly-row" id="hourly"></div>
            <div class="forecast-row" id="forecast"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="time-display">
      <div class="time-clock" id="clock">--:--</div>
      <div class="time-date" id="dateDisplay">--</div>
    </div>
  </div>
</div>

<a class="credit" href="https://loganjones.dev">Logan Jones</a>

<script type="module" src="js/main.js"></script>
</body>
</html>
